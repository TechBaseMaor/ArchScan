# ── ArchScan Frontend — Netlify Deploy Configuration ─────────────────────
#
# Required environment variable (set in Netlify UI → Site settings → Environment variables):
#   VITE_API_BASE_URL = https://archscan.onrender.com
#
# The prebuild script (frontend/scripts/validate-env.js) will fail the build
# if this variable is missing or set to localhost in CI.

# ── Production build ─────────────────────────────────────────────────────
[build]
  base = "frontend"
  command = "npm ci --prefer-offline && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  CI = "true"
  NPM_FLAGS = "--prefer-offline"

# ── Deploy-context overrides ─────────────────────────────────────────────

# Production: strict build, security headers
# NOTE: NODE_ENV is NOT set here — npm ci must install devDependencies
# (typescript, vite, etc.) for the build to succeed. Vite already builds
# in production mode by default.
[context.production]
  command = "npm ci --prefer-offline && npm run build"

# Deploy previews (PRs): same build
[context.deploy-preview]
  command = "npm ci --prefer-offline && npm run build"

# Branch deploys: disabled (only main goes to production)
[context.branch-deploy]
  command = "echo 'Branch deploys disabled — only main is deployed' && exit 0"

# ── SPA redirect ─────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
