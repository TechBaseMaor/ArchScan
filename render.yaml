services:
  - type: web
    name: archscan-api
    runtime: python
    repo: https://github.com/TechBaseMaor/ArchScan.git
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false  # Neon pooled connection string — set in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false  # e.g. https://archscan-planandgo.netlify.app — set in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
