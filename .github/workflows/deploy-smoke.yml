name: Post-Deploy Smoke Tests

on:
  # Run after push to main (Render auto-deploys from this branch)
  push:
    branches: [main]
  # Allow manual trigger for on-demand verification
  workflow_dispatch:

env:
  API_BASE: https://archscan.onrender.com
  FRONTEND_URL: https://archscan-planandgo.netlify.app

jobs:
  wait-for-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for Render deploy to go live
        run: |
          echo "Waiting for new deployment to propagate..."
          sleep 300

  smoke-backend:
    needs: wait-for-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Health check
        run: |
          RESP=$(curl -sf --retry 5 --retry-delay 30 "$API_BASE/health")
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Bad status: {d}'
          print('Health OK — storage:', d.get('storage', 'unknown'))
          "

      - name: Verify Postgres storage
        run: |
          STORAGE=$(curl -sf "$API_BASE/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('storage',''))")
          if [ "$STORAGE" != "postgres" ]; then
            echo "::warning::Storage is '$STORAGE' — expected 'postgres'. Check DATABASE_URL in Render."
          else
            echo "Storage: postgres — Neon connected"
          fi

      - name: GET /projects returns JSON array
        run: |
          HTTP_CODE=$(curl -s -o /tmp/projects.json -w "%{http_code}" "$API_BASE/projects")
          echo "HTTP $HTTP_CODE"
          test "$HTTP_CODE" = "200"
          python3 -c "import json; d=json.load(open('/tmp/projects.json')); assert isinstance(d, list), f'Expected list, got {type(d)}'; print(f'{len(d)} project(s)')"

      - name: GET /rulesets returns JSON array
        run: |
          HTTP_CODE=$(curl -s -o /tmp/rulesets.json -w "%{http_code}" "$API_BASE/rulesets")
          echo "HTTP $HTTP_CODE"
          test "$HTTP_CODE" = "200"
          python3 -c "import json; d=json.load(open('/tmp/rulesets.json')); assert isinstance(d, list), f'Expected list, got {type(d)}'; print(f'{len(d)} ruleset(s)')"

      - name: GET /health returns valid JSON schema
        run: |
          curl -sf "$API_BASE/health" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          required = ['status']
          for key in required:
              assert key in d, f'Missing key: {key}'
          print('Schema valid:', json.dumps(d))
          "

      - name: CORS preflight allows frontend origin
        run: |
          CORS_ORIGIN=$(curl -s -o /dev/null -w "%{http_code}" \
            -X OPTIONS \
            -H "Origin: $FRONTEND_URL" \
            -H "Access-Control-Request-Method: GET" \
            "$API_BASE/health")
          echo "Preflight HTTP: $CORS_ORIGIN"
          test "$CORS_ORIGIN" = "200"

          ACAO=$(curl -s -D - -o /dev/null \
            -X OPTIONS \
            -H "Origin: $FRONTEND_URL" \
            -H "Access-Control-Request-Method: GET" \
            "$API_BASE/health" | grep -i "access-control-allow-origin" | tr -d '\r')
          echo "Header: $ACAO"
          echo "$ACAO" | grep -qi "$FRONTEND_URL" \
            && echo "CORS origin OK" \
            || { echo "::error::CORS Access-Control-Allow-Origin does not include $FRONTEND_URL"; exit 1; }

  smoke-frontend:
    needs: wait-for-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Frontend responds 200
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL")
          echo "Frontend HTTP: $HTTP_CODE"
          test "$HTTP_CODE" = "200"

      - name: Frontend HTML contains app root
        run: |
          curl -sf "$FRONTEND_URL" | grep -q "ArchScan" && echo "App title found" || echo "::warning::ArchScan title not found in HTML"

      - name: Frontend bundle does not contain localhost API
        run: |
          BUNDLE=$(curl -sf "$FRONTEND_URL")
          if echo "$BUNDLE" | grep -q "localhost:8000"; then
            echo "::error::Frontend bundle contains localhost:8000 — VITE_API_BASE_URL was not set during build"
            exit 1
          fi
          echo "No localhost references in HTML — OK"

  env-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Run env safety checks
        run: ./scripts/check_env_safety.sh
